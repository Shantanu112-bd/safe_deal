name: SafeDeal CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test merchant-escrow
        run: cd contracts/merchant-escrow && cargo test

      - name: Test fraud-detection
        run: cd contracts/fraud-detection && cargo test

      - name: Test dispute-resolution
        run: cd contracts/dispute-resolution && cargo test

      - name: Test seller-verification
        run: cd contracts/seller-verification && cargo test

      - name: Test fiat-bridge
        run: cd contracts/fiat-bridge && cargo test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linter
        run: cd frontend && npm run lint --if-present

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_ESCROW_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_ESCROW_CONTRACT_ID }}
          NEXT_PUBLIC_FRAUD_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_FRAUD_CONTRACT_ID }}
          NEXT_PUBLIC_DISPUTE_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_DISPUTE_CONTRACT_ID }}
          NEXT_PUBLIC_VERIFICATION_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_VERIFICATION_CONTRACT_ID }}
          NEXT_PUBLIC_FIAT_BRIDGE_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_FIAT_BRIDGE_CONTRACT_ID }}
          NEXT_PUBLIC_USDC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_USDC_CONTRACT_ID }}

  deploy:
    needs: [test-contracts, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          cd frontend
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        run: |
          cd frontend
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
